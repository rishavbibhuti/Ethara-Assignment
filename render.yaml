databases:
  - name: seatflow-db
    plan: free

services:
  - type: web
    name: seatflow-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt psycopg2-binary
    # Seed runs before the server starts. It is idempotent — it only inserts
    # data when the database is empty, so restarts/redeploys won't duplicate it.
    startCommand: python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: seatflow-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false   # set to your Vercel frontend URL after it deploys
