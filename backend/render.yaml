services:
  - type: web
    name: seatflow-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt psycopg2-binary
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false        # set to your managed Postgres URL in the dashboard
      - key: CORS_ORIGINS
        sync: false        # set to your frontend URL, e.g. https://seatflow.vercel.app
